---
- name: Bootstrap CI/CD hosts
  hosts: all
  become: true
  vars:
    common_packages:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - unzip
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install common packages
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present

    - name: Install Docker runtime
      ansible.builtin.apt:
        name: docker.io
        state: present

    - name: Install AWS CLI
      ansible.builtin.apt:
        name: awscli
        state: present

    - name: Install kubectl helper prerequisites
      ansible.builtin.get_url:
        url: https://dl.k8s.io/release/stable.txt
        dest: /tmp/kubectl-version.txt
        mode: '0644'

    - name: Read kubectl version
      ansible.builtin.slurp:
        src: /tmp/kubectl-version.txt
      register: kubectl_version_file

    - name: Set kubectl version fact
      ansible.builtin.set_fact:
        kubectl_version: "{{ kubectl_version_file.content | b64decode | trim }}"

    - name: Download kubectl binary
      ansible.builtin.get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'

    - name: Ensure Docker service is enabled and running
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    - name: Add current user to docker group if present
      ansible.builtin.user:
        name: "{{ ansible_user | default('ubuntu') }}"
        groups: docker
        append: true